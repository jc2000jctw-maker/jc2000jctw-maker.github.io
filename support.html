    <p><a href="mailto:jc2000jc.tw@yahoo.com.tw">jc2000jc.tw@yahoo.com.tw</a></p>

    <section>
      <h2>常見問題</h2>
      <p><strong>前鏡頭小窗沒有出現？</strong><br>請確認已允許相機權限，或重新開啟 app。</p>
      <p><strong>為什麼有時候會看到全頁廣告？</strong><br>App 啟動或回到前景時，會嘗試顯示 App Open 廣告；若廣告沒有可用庫存，可能不會出現。</p>
      <p><strong>亮度看起來不夠亮？</strong><br>建議提高螢幕亮度並在較暗環境使用。</p>
